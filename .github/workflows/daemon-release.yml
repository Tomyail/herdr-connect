name: Daemon Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test daemon
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Build runnable daemon
        run: go build -o /tmp/herdr-connect ./cmd/herdr-connect

      - name: Smoke test daemon
        run: /tmp/herdr-connect --source fake capabilities

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="herdr-connect_${version}_${GOOS}_${GOARCH}"
          binary="herdr-connect"
          if [[ "$GOOS" == "windows" ]]; then
            binary="herdr-connect.exe"
          fi

          mkdir -p "dist/$archive"
          go build -trimpath -ldflags="-s -w -X main.version=$version" -o "dist/$archive/$binary" ./cmd/herdr-connect
          if [[ "$GOOS" == "linux" && "$GOARCH" == "amd64" ]]; then
            "dist/$archive/$binary" --version | grep -Fx "herdr-connect $version"
          fi
          cp LICENSE "dist/$archive/LICENSE"
          cp docs/release/daemon.md "dist/$archive/README.md"

          if [[ "$GOOS" == "windows" ]]; then
            (cd dist && zip -9 -r "$archive.zip" "$archive")
          else
            tar -C dist -czf "dist/$archive.tar.gz" "$archive"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daemon-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz ./*.zip > SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          prerelease=()
          if [[ "$tag" == *-* ]]; then
            prerelease=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --verify-tag \
              --generate-notes \
              --title "$tag" \
              "${prerelease[@]}"
          fi
