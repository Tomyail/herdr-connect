name: Daemon Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test daemon
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Build runnable daemon
        run: go build -o /tmp/herdr-connect ./cmd/herdr-connect

      - name: Smoke test daemon
        run: /tmp/herdr-connect --source fake capabilities

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds run on a macOS runner so the binary can be signed,
          # notarized and stapled with codesign/notarytool/stapler. Signing
          # and notarizing don't require the runner's CPU to match the
          # target GOARCH (codesign/notarytool just operate on the file), so
          # amd64 doesn't need an Intel host — but GitHub is retiring Intel
          # macOS runners entirely (macos-13 was removed Dec 2025; macos-15-intel
          # is the last x86_64 image, supported until Aug 2027), so use it
          # explicitly rather than an arch-matched label that will keep
          # disappearing. macos-14 is also mid-deprecation (unsupported after
          # Nov 2026), so arm64 uses macos-15 rather than tracking whichever
          # OS version macos-latest happens to point to.
          - goos: darwin
            goarch: arm64
            runner: macos-15
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build daemon binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="herdr-connect_${version}_${GOOS}_${GOARCH}"
          binary="herdr-connect"
          if [[ "$GOOS" == "windows" ]]; then
            binary="herdr-connect.exe"
          fi
          mkdir -p "dist/$archive"
          go build -trimpath -ldflags="-s -w -X main.version=$version" -o "dist/$archive/$binary" ./cmd/herdr-connect
          echo "archive=$archive" >> "$GITHUB_ENV"
          echo "binary=$binary" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_ENV"

      # The following steps only run for macOS builds. They sign the binary
      # with a Developer ID Application certificate, submit it to Apple for
      # notarization, wait for the result, staple the notarization ticket,
      # and confirm Gatekeeper accepts it. notarytool --wait exits non-zero
      # on failure, which fails the job so no un-notarized asset is shipped.

      - name: Verify required macOS signing secrets
        if: matrix.goos == 'darwin'
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${MACOS_CERTIFICATE:-}" ]] && missing+=(MACOS_CERTIFICATE)
          [[ -z "${APP_STORE_CONNECT_API_KEY:-}" ]] && missing+=(APP_STORE_CONNECT_API_KEY)
          [[ -z "${APP_STORE_CONNECT_API_KEY_ID:-}" ]] && missing+=(APP_STORE_CONNECT_API_KEY_ID)
          [[ -z "${APP_STORE_CONNECT_API_KEY_ISSUER_ID:-}" ]] && missing+=(APP_STORE_CONNECT_API_KEY_ISSUER_ID)
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::macOS signing/notarization secrets are not configured: ${missing[*]}. Configure them in the repository settings before pushing a release tag."
            exit 1
          fi

      - name: Import Developer ID certificate into keychain
        if: matrix.goos == 'darwin'
        id: import_cert
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/signing.keychain-db"
          keychain_pwd="$(uuidgen)"
          echo "::add-mask::$keychain_pwd"

          cert_path="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$MACOS_CERTIFICATE" | base64 -d > "$cert_path"

          security create-keychain -p "$keychain_pwd" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_pwd" "$keychain_path"
          security import "$cert_path" -P "${MACOS_CERTIFICATE_PWD:-}" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-partition-list -S apple-tool:,apple: -k "$keychain_pwd" "$keychain_path" || true
          # Put the signing keychain first so codesign/notarytool find the identity.
          security list-keychains -d user -s "$keychain_path" login.keychain-db

          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Codesign macOS binary
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          identity="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | awk -F '"' '{print $2}')"
          if [[ -z "$identity" ]]; then
            echo "::error::No 'Developer ID Application' identity found in the imported keychain"
            exit 1
          fi
          echo "Using signing identity: $identity"

          bin="dist/$archive/$binary"
          # hardened runtime + secure timestamp are required by notarization.
          codesign --force --options runtime --sign "$identity" --timestamp "$bin"
          codesign --verify --strict --verbose=4 "$bin"

      - name: Notarize and staple macOS binary
        if: matrix.goos == 'darwin'
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY" | base64 -d > "$key_path"

          bin="dist/$archive/$binary"
          # notarytool requires a zipped upload; ditto preserves permissions/signature.
          notary_zip="$RUNNER_TEMP/notary-submit.zip"
          ( cd "dist/$archive" && ditto -c -k --keepParent "$binary" "$notary_zip" )

          echo "Submitting binary to Apple notarization..."
          xcrun notarytool submit "$notary_zip" \
            --key "$key_path" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            --wait

          echo "Stapling notarization ticket..."
          # stapler can return non-zero for a bare (non-.app) Mach-O executable
          # because Apple only embeds offline tickets into app/dmg/pkg
          # containers. Notarization is still valid via Gatekeeper's online
          # ticket check; the `notarytool submit --wait` "Accepted" status
          # above is the authoritative signal, not the checks below.
          if ! xcrun stapler staple "$bin"; then
            echo "::warning::stapler staple returned non-zero for the bare binary (Apple limits offline tickets for non-bundle executables). Notarization remains valid via the online Gatekeeper check submitted above."
          fi
          xcrun stapler validate "$bin" || true

          # `spctl -a --type execute` is designed for .app bundles: it always
          # reports "rejected (the code is valid but does not seem to be an
          # app)" for a bare Mach-O executable regardless of signing/notarization
          # status, so it cannot be used as a pass/fail gate here. Run it only
          # for informational log output (verified 2026-07-21 against a real
          # signed+notarized build of this exact binary: notarytool accepted
          # the submission, spctl still reported this exact benign rejection).
          echo "spctl assessment (informational only, see comment above):"
          spctl -a -vvv --type execute "$bin" || true

          # The test that actually matters: simulate what happens when a user
          # downloads this file (which sets the com.apple.quarantine extended
          # attribute) and runs it, since that's the real Gatekeeper enforcement
          # path for a standalone CLI tool.
          echo "Simulating a quarantined download and executing the binary..."
          xattr -w com.apple.quarantine "0081;$(printf '%x' "$(date +%s)");Safari;$(uuidgen | tr '[:upper:]' '[:lower:]')" "$bin"
          xattr -p com.apple.quarantine "$bin"
          "$bin" --version

      - name: Clean up signing keychain and credentials
        if: matrix.goos == 'darwin' && always()
        shell: bash
        run: |
          set -e
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP"/AuthKey_*.p8 "$RUNNER_TEMP/notary-submit.zip" 2>/dev/null || true

      - name: Stage release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GOOS" == "linux" && "$GOARCH" == "amd64" ]]; then
            "dist/$archive/$binary" --version | grep -Fx "herdr-connect $version"
          fi
          cp LICENSE "dist/$archive/LICENSE"
          cp docs/release/daemon.md "dist/$archive/README.md"

          if [[ "$GOOS" == "windows" ]]; then
            (cd dist && zip -9 -r "$archive.zip" "$archive")
          else
            tar -C dist -czf "dist/$archive.tar.gz" "$archive"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daemon-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./*.tar.gz ./*.zip > SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          prerelease=()
          if [[ "$tag" == *-* ]]; then
            prerelease=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --verify-tag \
              --generate-notes \
              --title "$tag" \
              "${prerelease[@]}"
          fi
